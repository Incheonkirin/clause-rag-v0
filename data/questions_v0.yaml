# 가상 자동차보험 표준약관 v0 QA 5문제
questions:
  - code: Q-001
    question: 음주운전 사고는 보험금이 전혀 지급되지 않는가?
    expected: [면책, 대인배상 I 일부 보상, 의무]

  - code: Q-002
    question: 보험금 청구권은 언제부터 몇 년이 지나면 소멸하는가?
    expected: [3년, 손해 발생을 안 날, 시효]

  - code: Q-003
    question: 사고 후 수리비가 급한데 보험금 지급 결정 전에 받을 방법이 있는가?
    expected: [가지급금, 선지급, 추후 공제]

  - code: Q-004
    question: 자기차량손해의 자기부담금 범위는?
    expected: [20만원, 50만원, 약정]

  - code: Q-005
    question: 보험사가 보험금을 지급한 후 사고 원인을 제공한 제3자에게 어떻게 대응하는가?
    expected: [대위, 권리 취득, 한도 내]
